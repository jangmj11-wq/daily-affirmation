<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 나에게</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2D5A3D;
    width: 100vw;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 40px 80px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 6px);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 20px;
    border: 6px solid #5C3D1E;
    border-radius: 4px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.06), 0 0 0 2px rgba(0,0,0,0.3);
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  .date-label {
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.01em;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.3s;
  }

  .board-title {
    font-size: 16px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.5s;
  }
  .board-title::before, .board-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.25) 0px, rgba(255,255,255,0.25) 6px, transparent 6px, transparent 10px);
  }

  .quote-mark {
    font-size: 80px;
    color: rgba(255,255,255,0.18);
    line-height: 0.7;
    display: block;
    margin-bottom: 12px;
    transform: rotate(-2deg);
  }

  .quote-text {
    font-size: 46px;
    font-weight: 700;
    color: rgba(255,255,255,0.93);
    line-height: 1.6;
    text-shadow: 0 0 12px rgba(255,255,255,0.15), 1px 1px 0 rgba(0,0,0,0.25);
    letter-spacing: 0em;
    transition: opacity 0.5s ease;
    min-height: 80px;
    word-break: keep-all;
  }
  .quote-text.loading { opacity: 0.2; }

  .chalk-line {
    width: 60%;
    height: 2px;
    margin: 36px auto;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.3) 0px, rgba(255,255,255,0.3) 8px, transparent 8px, transparent 13px);
    position: relative;
  }
  .chalk-line::after {
    content: '✦';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    background: #2D5A3D;
    padding: 0 10px;
  }

  .sub-text {
    font-size: 26px;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    letter-spacing: 0em;
    transition: opacity 0.5s ease;
    min-height: 48px;
    word-break: keep-all;
  }
  .sub-text.loading { opacity: 0.15; }

  .time-text {
    margin-top: 48px;
    font-size: 15px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.01em;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1s;
  }

  .quote-area {
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.7s;
    width: 100%;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    body { padding: 40px 48px; }
    .quote-text { font-size: 32px; }
    .sub-text { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="date-label" id="dateLabel" style="display:none"></div>
  <div class="board-title">오늘의 나에게</div>
  <div class="quote-area">
    
    <p class="quote-text loading" id="quoteText"> </p>
    <div class="chalk-line"></div>
    <p class="sub-text loading" id="subText"> </p>
  </div>
  <div class="time-text" id="timeText"></div>
</div>

<script>
  const today = new Date();
  document.getElementById('dateLabel').textContent =
    today.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

  const start = new Date(today.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((today - start) / 86400000);
  const currentHour = today.getHours();
  const seed = `${today.getFullYear()}-${dayOfYear}-${currentHour}`;

  const nextHour = new Date(today);
  nextHour.setHours(currentHour + 1, 0, 0, 0);
  document.getElementById('timeText').textContent =
    nextHour.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) + '에 새 문구로 바뀌어요';

  async function loadQuote() {
    const quoteEl = document.getElementById('quoteText');
    const subEl   = document.getElementById('subText');

    const prompt = `오늘 자존감이 낮아지고 부정적으로 생각하는 사람에게 따뜻하고 진심 어린 자기긍정 문구를 하나 만들어줘.

규칙:
- 씨드(날짜/시간 기반 고유값): ${seed}
- 문구는 위로가 되고, 가볍지 않고, 진심이 느껴져야 해
- 너무 뻔하거나 자기계발서 느낌 나지 않게
- 한 문장 또는 두 문장 (짧고 깊게)
- 설명 한 줄 추가 (문구의 의미를 부드럽게 풀어서)
- 반드시 아래 JSON 형식으로만 응답해 (마크다운 없이):
{"quote": "문구 내용", "sub": "설명 한 줄"}`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const raw = data.content?.map(b => b.text || '').join('') || '';
      const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
      quoteEl.textContent = parsed.quote;
      subEl.textContent   = parsed.sub;
    } catch (e) {
      quoteEl.textContent = '지금 이 순간, 당신은 충분히 괜찮아요.';
      subEl.textContent   = '완벽하지 않아도 괜찮아요. 오늘도 여기 있다는 것만으로 충분해요.';
    }

    quoteEl.classList.remove('loading');
    subEl.classList.remove('loading');
  }

  loadQuote();
</script>
</body>
</html>
